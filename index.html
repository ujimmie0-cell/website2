<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vanitas | Guestbook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glow-color: rgba(255, 255, 255, 0.4);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.4);
            --accent-glow: #00ff00;
            --board-border: rgba(255, 255, 255, 0.08);
            --msg-bg: rgba(255, 255, 255, 0.02);
            --reply-bg: rgba(255, 255, 255, 0.04);
            --form-label-bg: rgba(255, 255, 255, 0.03);
            --card-radius: 6px;
        }

        @font-face {
            font-family: 'TestFont1';
            src: url('test/font1.ttf') format('truetype');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: #000000;
            color: var(--text-main);
            font-family: Courier, monospace, sans-serif;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        .board-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .thread-prompt {
            text-align: center;
            margin-bottom: -10px;
        }
        
        .thread-prompt .guestbook-header {
            font-size: 1.6rem;
            letter-spacing: 4px;
            text-transform: lowercase;
            color: var(--text-main);
            font-weight: bold;
        }

        .rules-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--board-border);
            border-radius: var(--card-radius);
            padding: 12px;
            font-size: 0.8rem;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.6);
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        .rules-card h3 {
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 6px;
        }
        
        .rules-card ol { 
            padding-left: 18px; 
        }

        .form-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            gap: 12px;
        }

        form {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .inputs-table {
            display: table;
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--board-border);
            border-radius: var(--card-radius);
            overflow: hidden;
        }

        .form-row {
            display: table-row;
        }

        .form-label {
            display: table-cell;
            background: var(--form-label-bg);
            border-right: 1px solid var(--board-border);
            padding: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-main);
            width: 90px;
            vertical-align: middle;
        }

        .form-row:first-child .form-label, 
        .form-row:first-child .form-input-cell {
            border-bottom: 1px solid var(--board-border);
        }

        .form-input-cell {
            display: table-cell;
            padding: 4px;
            position: relative;
        }
        
        form input, form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            color: var(--text-main);
            padding: 6px 8px;
            font-family: inherit;
            font-size: 0.85rem;
        }
        
        form input:focus, form textarea:focus {
            border-color: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        .char-counter {
            font-size: 0.7rem;
            color: var(--text-sub);
            position: absolute;
            right: 12px;
            bottom: 10px;
        }

        form button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--board-border);
            border-radius: 4px;
            color: var(--text-main);
            padding: 8px 24px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 4px;
            width: auto;
            min-width: 120px;
        }
        
        form button:hover:not(:disabled) {
            background: #ffffff;
            color: #000000;
        }

        form button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .search-box-wrap {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .search-box-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--board-border);
            border-radius: var(--card-radius);
            color: var(--text-main);
            padding: 8px;
            font-family: inherit;
            font-size: 0.8rem;
            text-align: center;
        }

        /* Minimal Traditional Admin Console */
        .admin-dashboard {
            display: none;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: transparent;
            border: 1px solid var(--board-border);
            border-radius: var(--card-radius);
            padding: 14px;
        }
        .admin-dashboard h4 {
            color: var(--text-main);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .admin-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .admin-row-inline {
            display: flex;
            gap: 6px;
        }
        .admin-dash-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--board-border);
            color: #ffffff;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .admin-dash-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .admin-grid input {
            background: #000000;
            border: 1px solid var(--board-border);
            color: #fff;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 0.75rem;
            border-radius: 4px;
            flex: 1;
        }
        .log-output-pane {
            background: #000000;
            border: 1px solid var(--board-border);
            font-size: 0.7rem;
            padding: 8px;
            max-height: 140px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #aaaaaa;
            margin-top: 6px;
            display: none;
        }

        /* Imageboard Threads UI */
        .thread-group {
            display: flex;
            flex-direction: column;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 16px;
            margin-top: 10px;
        }

        .message-box {
            background: var(--msg-bg);
            border: 1px solid var(--board-border);
            border-radius: var(--card-radius);
            padding: 12px 16px;
            width: 100%;
            margin-bottom: 6px;
            position: relative;
        }

        .reply-box {
            background: var(--reply-bg);
            border: 1px solid var(--board-border);
            border-radius: var(--card-radius);
            padding: 12px 16px;
            margin-top: 6px;
            margin-left: 40px;
            display: table; 
            max-width: calc(100% - 40px);
            position: relative;
        }

        .reply-box::before {
            content: ">>";
            position: absolute;
            left: -26px;
            top: 12px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.8rem;
        }
        
        .meta { 
            color: var(--text-sub); 
            font-size: 0.8rem; 
            margin-bottom: 8px; 
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .poster-name {
            color: #119955;
            font-weight: bold;
        }

        .post-id-link {
            color: #0049D1;
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
        }
        .post-id-link:hover {
            color: #ffaa00;
        }

        .reply-tag {
            color: #ffaa00;
            font-weight: bold;
        }
        
        .tripcode { 
            color: #D10088; 
            font-weight: bold; 
        }

        .pin-indicator {
            color: #ffff33;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-right: 4px;
        }
        
        .text-content { 
            word-break: break-word; 
            line-height: 1.5; 
            white-space: pre-wrap; 
            font-size: 0.85rem;
            padding-left: 2px;
        }

        .post-footer {
            display: flex;
            justify-content: flex-start;
            margin-top: 6px;
            gap: 10px;
            align-items: center;
        }

        .clap-btn {
            background: transparent;
            border: none;
            color: var(--text-sub);
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 2px 4px;
            transition: color 0.1s;
        }
        .clap-btn:hover {
            color: #ffaa00;
        }

        .admin-inline-del-btn, .admin-inline-pin-btn {
            background: transparent;
            border: none;
            color: #ff3333;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.7rem;
            display: none;
        }
        .admin-inline-pin-btn {
            color: #ffaa00;
        }
        .admin-inline-del-btn:hover, .admin-inline-pin-btn:hover {
            text-decoration: underline;
        }

        .collapse-banner {
            color: var(--text-sub);
            font-size: 0.75rem;
            padding: 6px;
            margin-left: 40px;
            cursor: pointer;
            text-decoration: underline;
        }
        .collapse-banner:hover {
            color: #ffaa00;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            font-size: 0.8rem;
            border: 1px solid var(--board-border);
            border-radius: var(--card-radius);
            padding: 6px;
            background: rgba(255, 255, 255, 0.01);
        }

        .pag-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-family: inherit;
            padding: 2px 6px;
        }
        .pag-btn:hover:not(:disabled) {
            text-decoration: underline;
        }
        .pag-btn:disabled {
            color: var(--text-sub);
            cursor: not-allowed;
            opacity: 0.3;
        }

        /* Raw Code Block Style to escape markup rules */
        .mk-raw-code {
            font-family: Courier, monospace;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--board-border);
            padding: 6px 10px;
            display: block;
            margin: 6px 0;
            border-radius: 4px;
            color: #cccccc;
        }

        /* --- STYLED MARKDOWN STRUCTURAL PARSERS --- */
        .mk-large { font-size: 1.3rem; font-weight: bold; display: block; margin: 4px 0; color: #ffffff; }
        .mk-medium { font-size: 1.1rem; font-weight: bold; display: block; margin: 3px 0; color: #dddddd; }
        .mk-green { color: #789922; }
        .mk-orange { color: #ff8800; }
        .mk-bold { font-weight: bold; }
        .mk-italic { font-style: italic; }
        .mk-strike { text-decoration: line-through; opacity: 0.6; }
        .mk-underline { text-decoration: underline; }
        .mk-glow {
            color: #000000 !important;
            background-color: #000000;
            text-shadow: 0 0 4px var(--accent-glow), 0 0 8px var(--accent-glow);
            padding: 0 4px;
            border-radius: 2px;
            display: inline-block;
        }
        .mk-blue-font { font-family: 'TestFont1', sans-serif; color: #3388ff; }
        .mk-spoiler {
            background: #222222;
            color: #222222;
            cursor: pointer;
            padding: 0 2px;
        }
        .mk-spoiler:hover {
            color: inherit;
            background: transparent;
        }

        /* Custom Color Signatures */
        .c-gray { color: #888888; }
        .c-red { color: #ff3333; }
        .c-orange { color: #ff9933; }
        .c-yellow { color: #ffff33; }
        .c-green { color: #33ff33; }
        .c-cyan { color: #33ffff; }
        .c-blue { color: #3366ff; }
        .c-indigo { color: #6600ff; }
        .c-violet { color: #cc33ff; }
        
        @keyframes rainbow-anim {
            0% { color: #ff3333; } 16% { color: #ff9933; } 33% { color: #ffff33; }
            50% { color: #33ff33; } 66% { color: #33ffff; } 83% { color: #3366ff; } 100% { color: #ff3333; }
        }
        .c-rainbow { animation: rainbow-anim 4s infinite linear; font-weight: bold; }
    </style>
</head>

        function parseTextboardMarkup(rawText) {
            // First step: Isolate raw code blocks wrapped in triple backticks
            const segments = [];
            const codeBlockRegex = /```([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;

            while ((match = codeBlockRegex.exec(rawText)) !== null) {
                // Add preceding text before code segment
                if (match.index > lastIndex) {
                    segments.push({ type: 'text', content: rawText.substring(lastIndex, match.index) });
                }
                // Add the code content completely unformatted
                segments.push({ type: 'code', content: match[1] });
                lastIndex = codeBlockRegex.lastIndex;
            }
            if (lastIndex < rawText.length) {
                segments.push({ type: 'text', content: rawText.substring(lastIndex) });
            }

            // If there are no code blocks, parse everything normally
            if (segments.length === 0) {
                return applyTextFormatting(rawText);
            }

            return segments.map(seg => {
                if (seg.type === 'code') {
                    // Escape basic HTML inside code block but completely bypass internal markdown parsing
                    let cleanCode = seg.content
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");
                    return `<span class="mk-raw-code">${cleanCode}</span>`;
                } else {
                    return applyTextFormatting(seg.content);
                }
            }).join('');
        }

        function applyTextFormatting(text) {
            let safeHtml = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");

            // Custom Single-Line Color Parsers
            safeHtml = safeHtml.replace(/^([^%\n]*?)%gray (.*)$/gm, '$1<span class="c-gray">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%red (.*)$/gm, '$1<span class="c-red">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%orange (.*)$/gm, '$1<span class="c-orange">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%yellow (.*)$/gm, '$1<span class="c-yellow">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%green (.*)$/gm, '$1<span class="c-green">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%cyan (.*)$/gm, '$1<span class="c-cyan">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%blue (.*)$/gm, '$1<span class="c-blue">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%indigo (.*)$/gm, '$1<span class="c-indigo">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%violet (.*)$/gm, '$1<span class="c-violet">$2</span>');
            safeHtml = safeHtml.replace(/^([^%\n]*?)%rainbow (.*)$/gm, '$1<span class="c-rainbow">$2</span>');

            // Header Elements
            safeHtml = safeHtml.replace(/^# (.*?)$/gm, '<span class="mk-large">$1</span>');
            safeHtml = safeHtml.replace(/^## (.*?)$/gm, '<span class="mk-medium">$1</span>');

            // Text Board Indicators
            safeHtml = safeHtml.replace(/^&gt;(.*?)$/gm, '<span class="mk-green">&gt;$1</span>');
            safeHtml = safeHtml.replace(/^&lt;(.*?)$/gm, '<span class="mk-orange">&lt;$1</span>');
            safeHtml = safeHtml.replace(/&gt;&gt;(\d+)/g, '<span class="reply-tag">&gt;&gt;$1</span>');
            
            // Text Modifiers
            safeHtml = safeHtml.replace(/\*\*(.*?)\*\*/g, '<span class="mk-bold">$1</span>');
            safeHtml = safeHtml.replace(/\*(.*?)\*/g, '<span class="mk-italic">$1</span>');
            safeHtml = safeHtml.replace(/~(.*?)~/g, '<span class="mk-strike">$1</span>');
            safeHtml = safeHtml.replace(/_(.*?)_/g, '<span class="mk-underline">$1</span>');
            safeHtml = safeHtml.replace(/\+(.*?)\+/g, '<span class="mk-glow">$1</span>');
            safeHtml = safeHtml.replace(/\(\(\((.*?)\)\)\)/g, '<span class="mk-blue-font">$1</span>');
            safeHtml = safeHtml.replace(/\|(.*?)\|/g, '<span class="mk-spoiler">$1</span>');

            return safeHtml;
        }

        window.insertReplyTag = function(num) {
            messageInput.value += `>>${num} `;
            messageInput.dispatchEvent(new Event('input'));

window.adminInspectTripcode = async function() {

    if(!tripVal) return alert("Enter tripcode to inspect.");
    const pane = document.getElementById('adminLogOutput');
    const typedSecret = document.getElementById('username').value;
    
    const res = await fetch(`${API_URL}/admin/inspect-tripcode`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Token": typedSecret },
        body: JSON.stringify({ targetTripcode: tripVal })
    });
    const data = await res.json();
    
    pane.style.display = 'block';
    let ipReport = "";
    for (const [ip, count] of Object.entries(data.associatedIps)) {
        ipReport += `  - ${ip} (used in ${count} post(s))\n`;
    }
    pane.textContent = `INSPECT REPORT FOR ${data.tripcode}\nTotal Board Count: ${data.postCount} posts\nLinked IP Signatures:\n${ipReport || "  No active IPs recorded."}`;
};

window.adminFetchSystemLogs = async function() {
    const pane = document.getElementById('adminLogOutput');
    const typedSecret = document.getElementById('username').value;
    const res = await fetch(`${API_URL}/admin/logs`, {
        headers: { "X-Admin-Token": typedSecret }
    });
    const data = await res.json();
    pane.style.display = 'block';
    pane.textContent = data.map(l => `[${l.timestamp}] IP:${l.ip} -> ${l.action}`).join('\n') || "No operations logged.";
};

        window.executeClapAction = async function(timestamp, btnId) {
            const hasClapped = localStorage.getItem(`clapped_${timestamp}`);
            if (hasClapped) return;

            try {
                const response = await fetch(`${API_URL}/clap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ timestamp })
                });
                if (response.ok) {
                    localStorage.setItem(`clapped_${timestamp}`, "true");
                    const targetBtn = document.getElementById(btnId);
                    if (targetBtn) {
                        const currentCount = parseInt(targetBtn.textContent.replace('▲ ', ''), 10) || 0;
                        targetBtn.textContent = `▲ ${currentCount + 1}`;
                    }
                }
            } catch (err) {
                console.error("Upvote processing fault.");
            }
        };

        window.toggleThreadExpansion = function(opPostNum) {
            if (expandedThreadsSet.has(opPostNum)) {
                expandedThreadsSet.delete(opPostNum);
            } else {
                expandedThreadsSet.add(opPostNum);
            }
            renderActivePageData();
        };

        async function fetchMessages() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.length === 0) {
                    board.innerHTML = "<div style='text-align:center; opacity:0.3; font-size:0.9rem; padding: 40px;'>No entries yet.</div>";
                    document.getElementById('paginationControls').innerHTML = '';
                    return;
                }

                const indexedEntries = [...data].reverse().map((entry, idx) => ({
                    ...entry,
                    postNum: idx + 1,
                    claps: entry.claps || 0,
                    pinned: entry.pinned || false
                }));

                const mainThreads = [];
                const repliesMap = {};

                indexedEntries.forEach(entry => {
                    const match = entry.message.match(/>>(\d+)/);
                    const parentId = match ? parseInt(match[1], 10) : null;

                    if (parentId && parentId < entry.postNum && indexedEntries.some(e => e.postNum === parentId)) {
                        if (!repliesMap[parentId]) repliesMap[parentId] = [];
                        repliesMap[parentId].push(entry);
                    } else {
                        mainThreads.push(entry);
                    }
                });

                mainThreads.forEach(thread => {
                    thread.replies = repliesMap[thread.postNum] || [];
                    if (thread.replies.length > 0) {
                        thread.lastBumpTime = Math.max(...thread.replies.map(r => new Date(r.timestamp).getTime()));
                    } else {
                        thread.lastBumpTime = new Date(thread.timestamp).getTime();
                    }
                });

                // Priority sorting: Float pinned items to the top, then sort by bump signature time
                mainThreads.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return b.lastBumpTime - a.lastBumpTime;
                });

                allProcessedThreads = mainThreads;
                applyFiltersAndRender();

            } catch (err) {
                board.innerHTML = "<div style='color:#ff0055; text-align:center; font-size:0.9rem; padding: 20px;'>Failed to load message boards.</div>";
            }
        }

        function applyFiltersAndRender() {
            if (!searchQuery) {
                filteredThreads = allProcessedThreads;
            } else {
                filteredThreads = allProcessedThreads.filter(thread => {
                    const opMatch = thread.username.toLowerCase().includes(searchQuery) || thread.message.toLowerCase().includes(searchQuery);
                    const replyMatch = thread.replies.some(r => r.username.toLowerCase().includes(searchQuery) || r.message.toLowerCase().includes(searchQuery));
                    return opMatch || replyMatch;
                });
            }
            renderActivePageData();
        }

        function renderActivePageData() {
            board.innerHTML = '';
            if (filteredThreads.length === 0) {
                board.innerHTML = "<div style='text-align:center; opacity:0.3; font-size:0.9rem; padding: 40px;'>No matching boards found.</div>";
                document.getElementById('paginationControls').innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(filteredThreads.length / threadsPerPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const startIndex = (currentPage - 1) * threadsPerPage;
            const endIndex = startIndex + threadsPerPage;
            const pageThreads = filteredThreads.slice(startIndex, endIndex);

            pageThreads.forEach(thread => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'thread-group';
                groupDiv.appendChild(createPostElement(thread, 'message-box', true));

                const totalReplies = thread.replies.length;
                if (totalReplies > 3 && !expandedThreadsSet.has(thread.postNum)) {
                    const hiddenCount = totalReplies - 3;
                    const banner = document.createElement('div');
                    banner.className = 'collapse-banner';
                    banner.textContent = `[See ${hiddenCount} more replies...]`;
                    banner.setAttribute('onclick', `toggleThreadExpansion(${thread.postNum})`);
                    groupDiv.appendChild(banner);

                    const cutReplies = thread.replies.slice(-3);
                    cutReplies.forEach(reply => {
                        groupDiv.appendChild(createPostElement(reply, 'reply-box', false));
                    });
                } else {
                    if (totalReplies > 3) {
                        const banner = document.createElement('div');
                        banner.className = 'collapse-banner';
                        banner.textContent = `[Collapse replies]`;
                        banner.setAttribute('onclick', `toggleThreadExpansion(${thread.postNum})`);
                        groupDiv.appendChild(banner);
                    }
                    thread.replies.forEach(reply => {
                        groupDiv.appendChild(createPostElement(reply, 'reply-box', false));
                    });
                }
                board.appendChild(groupDiv);
            });

            renderPaginationControls(totalPages);
        }

        function createPostElement(entry, className, isOpPost = false) {
            const dateStr = new Date(entry.timestamp).toLocaleString('en-US', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            });

            const box = document.createElement('div');
            box.className = className;
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta';

            if (isOpPost && entry.pinned) {
                const pinBadge = document.createElement('span');
                pinBadge.className = 'pin-indicator';
                pinBadge.textContent = '[PINNED]';
                metaDiv.appendChild(pinBadge);
            }
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'poster-name';
            nameSpan.textContent = entry.username;
            metaDiv.appendChild(nameSpan);

            if (entry.tripcode && entry.tripcode !== "None") {
                const tripSpan = document.createElement('span');
                tripSpan.className = 'tripcode';
                tripSpan.textContent = entry.tripcode;
                metaDiv.appendChild(tripSpan);
            }

            const timeSpan = document.createElement('span');
            timeSpan.textContent = ` ${dateStr}`;
            metaDiv.appendChild(timeSpan);

            const idLink = document.createElement('a');
            idLink.className = 'post-id-link';
            idLink.textContent = ` No. ${entry.postNum}`;
            idLink.setAttribute('onclick', `insertReplyTag(${entry.postNum})`);
            metaDiv.appendChild(idLink);

            const textDiv = document.createElement('div');
            textDiv.className = 'text-content';
            textDiv.innerHTML = parseTextboardMarkup(entry.message);

            const footerDiv = document.createElement('div');
            footerDiv.className = 'post-footer';

            const btnId = `clap-${entry.timestamp.replace(/[^0-9]/g, '')}`;
            const clapButton = document.createElement('button');
            clapButton.className = 'clap-btn';
            clapButton.id = btnId;
            clapButton.textContent = `▲ ${entry.claps}`;
            clapButton.setAttribute('onclick', `executeClapAction('${entry.timestamp}', '${btnId}')`);
            footerDiv.appendChild(clapButton);

            // Inline administrative tools context hooks
            const delButton = document.createElement('button');
            delButton.className = 'admin-inline-del-btn';
            delButton.textContent = "[Delete]";
            delButton.setAttribute('onclick', `adminDeleteSinglePost('${entry.timestamp}')`);
            
            const pinButton = document.createElement('button');
            pinButton.className = 'admin-inline-pin-btn';
            pinButton.textContent = entry.pinned ? "[Unpin Thread]" : "[Pin Thread]";
            pinButton.setAttribute('onclick', `adminTogglePinThread('${entry.timestamp}')`);

            if (isAdminLoggedIn) { 
                delButton.style.display = 'inline-block'; 
                if (isOpPost) pinButton.style.display = 'inline-block';
            }
            
            footerDiv.appendChild(delButton);
            footerDiv.appendChild(pinButton);

            box.appendChild(metaDiv);
            box.appendChild(textDiv);
            box.appendChild(footerDiv);
            return box;
        }

        function renderPaginationControls(totalPages) {
            const container = document.getElementById('paginationControls');
            container.innerHTML = '';
            if (totalPages <= 1) return;

            const firstBtn = document.createElement('button');
            firstBtn.className = 'pag-btn';
            firstBtn.textContent = '[First]';
            firstBtn.disabled = (currentPage === 1);
            firstBtn.onclick = () => { currentPage = 1; renderActivePageData(); };
            container.appendChild(firstBtn);

            const prevBtn = document.createElement('button');
            prevBtn.className = 'pag-btn';
            prevBtn.textContent = '[Prev]';
            prevBtn.disabled = (currentPage === 1);
            prevBtn.onclick = () => { currentPage--; renderActivePageData(); };
            container.appendChild(prevBtn);

            const statusSpan = document.createElement('span');
            statusSpan.textContent = `[ ${currentPage} / ${totalPages} ]`;
            container.appendChild(statusSpan);

            const nextBtn = document.createElement('button');
            nextBtn.className = 'pag-btn';
            nextBtn.textContent = '[Next]';
            nextBtn.disabled = (currentPage === totalPages);
            nextBtn.onclick = () => { currentPage++; renderActivePageData(); };
            container.appendChild(nextBtn);

            const lastBtn = document.createElement('button');
            lastBtn.className = 'pag-btn';
            lastBtn.textContent = '[Last]';
            lastBtn.disabled = (currentPage === totalPages);
            lastBtn.onclick = () => { currentPage = totalPages; renderActivePageData(); };
            container.appendChild(lastBtn);
        }

        function executeRateLimitCountdown() {
            let countdown = 10;
            submitBtn.disabled = true;
            submitBtn.textContent = `Cooldown (${countdown}s)`;

            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Submit";
                } else {
                    submitBtn.textContent = `Cooldown (${countdown}s)`;
                }
            }, 1000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const message = messageInput.value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, message })
                });

                if (response.ok) {
                    messageInput.value = '';
                    charCount.textContent = "0 / 700";
                    executeRateLimitCountdown();
                    fetchMessages();
                } else {
                    alert("Submission blocked.");
                }
            } catch (err) {
                alert("Network error.");
            }
        });

        fetchMessages();
        setInterval(() => { fetchMessages(); }, 10000);
    </script>
